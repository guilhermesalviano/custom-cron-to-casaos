version: '3.8'
services:
  scrapers-1:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: scrapers-1
    restart: unless-stopped
    network_mode: bridge
    deploy:
      resources:
        limits:
          memory: 1024M
    environment:
      - DB_HOST=xxx.xxx.xxx.xxx
      - DB_NAME=xxxx
      - DB_PASSWORD=xxxx
      - DB_PORT=xxxxx
      - DB_USER=xxxxxx
      - DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/xxxxxx
      - SERPAPI_KEY=xxxxxx
    labels:
      icon: "https://www.beorol.com/files/watermark/files/images/slike_proizvoda/thumbs_w/JS120_w_800_800px.jpg"
    volumes:
      - /DATA/ShareDatabase:/media/ShareDatabase